# pre-commit hooks. Install with:  uv run pre-commit install
# Run on all files:                uv run pre-commit run --all-files

# Pin the language runtime for hooks so pre-commit doesn't pick up
# whichever interpreter happens to be on $PATH. Matches
# pyproject.toml [project] requires-python lower bound + [tool.mypy]
# python_version. The local mypy hook runs via `uv run` which uses
# the project's resolved interpreter; this default applies to any
# future Python-language hook added below.
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 2c9f875913ee60ca25ce70243dc24d5b6415598c # v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: "tests/snapshot/__snapshots__/"
      - id: trailing-whitespace
        exclude: "\\.md$|tests/snapshot/__snapshots__/"
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 3b3f7c3f57fe9925356faf5fe6230835138be230 # v0.15.17
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types_or: [python, pyi]
        require_serial: true
        files: ^src/

      # Architectural-layer enforcement. CI already runs this via
      # ``ci.yml::lint-type`` and ``release.yml::verify``; mirroring
      # it locally as a pre-commit hook closes the asymmetry where a
      # contributor who installs the hooks but doesn't open a PR
      # against CI could still ship a layer violation. Runs on every
      # commit regardless of which file changed because the script
      # itself only takes ~50 ms and reports a single line on
      # success.
      - id: check-layers
        name: check-layers (architecture)
        entry: ./scripts/check-layers.sh
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: ade0f95ddcf661c697d4670d2cfcbe95d0048a0a # v0.9.3
    hooks:
      - id: taplo-format
      - id: taplo-lint
        # Override the hook's default `--default-schema-catalogs` arg: as of
        # 2026-06 the schemastore.org catalog URL that taplo v0.9.x fetches no
        # longer returns a catalog payload (it returns the catalog *schema*),
        # which makes taplo error out with a decode failure. Schema validation
        # is also disabled in .taplo.toml as a belt-and-braces measure.
        args: []
