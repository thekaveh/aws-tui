# Paste this block into <config-dir>/config.toml to point aws-tui at the
# local MinIO seeded by scripts/test-services/s3/seed.py. See docs/platforms.md
# for the exact OS path. Then launch:
#
#   aws-tui
#
# Open Settings with `,` to add/edit connections in the TUI, or paste
# this snippet by hand and relaunch. If you uncomment
# [defaults].connection = "dev-s3", aws-tui picks it on startup;
# otherwise press Shift+S to cycle a pane to this connection.

[connections.dev-s3]
kind = "s3-compatible"
endpoint_url = "http://localhost:9000"
region = "us-east-1"
credentials = "static"
access_key_id = "minioadmin"
secret_access_key = "minioadmin"
force_path_style = true
verify_tls = false

# Optional — make dev-s3 the default startup connection.
# [defaults]
# connection = "dev-s3"
