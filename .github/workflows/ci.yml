name: ci

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege: every job in this workflow only reads
# the repo and writes ephemeral actions-storage artifacts. No token
# scope above `contents: read` is needed.
permissions:
  contents: read

env:
  UV_VERSION: "0.11.19"

jobs:
  unit:
    name: unit (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: sync
        run: uv sync --frozen --python ${{ matrix.python }}
      # Runs unit + the in-process integration files (full-app pilot,
      # modal forwarding, etc. — they intentionally lack the
      # `integration` marker per pyproject's addopts comment). The
      # MinIO testcontainer tier is excluded by the default
      # `-m 'not integration'` addopts and runs in the integration job
      # below.
      - name: pytest (unit + in-process integration)
        run: uv run --python ${{ matrix.python }} pytest tests/unit tests/integration -v

  integration:
    name: integration (MinIO testcontainer)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python 3.12
        run: uv python install 3.12
      - name: sync
        run: uv sync --frozen --python 3.12
      - name: pytest (integration tier)
        run: uv run pytest -m integration -v

  coverage:
    name: coverage floor (py3.12)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python 3.12
        run: uv python install 3.12
      - name: sync
        run: uv sync --frozen --python 3.12
      - name: pytest coverage (unit + in-process integration)
        run: uv run --python 3.12 pytest tests/unit tests/integration --cov=aws_tui --cov-report=term-missing --cov-report=xml

  snapshot:
    name: snapshot (Textual SVG goldens)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python 3.12
        run: uv python install 3.12
      - name: sync
        run: uv sync --frozen --python 3.12
      - name: pytest (snapshot tier)
        run: uv run pytest tests/snapshot -v

  e2e:
    name: e2e (5 user journeys)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python 3.12
        run: uv python install 3.12
      - name: sync
        run: uv sync --frozen --python 3.12
      - name: pytest (e2e tier)
        run: uv run pytest tests/e2e -v

  lint-type:
    name: lint + type
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python 3.12
        run: uv python install 3.12
      - name: install Python 3.11 for pre-commit hooks
        run: uv python install 3.11
      - name: sync
        run: uv sync --frozen --python 3.12
      - name: layer rules
        run: ./scripts/check-layers.sh
      # Surfaces every hook defined in .pre-commit-config.yaml:
      # ruff, ruff-format, mypy, end-of-file-fixer, trailing-whitespace,
      # check-yaml, check-toml, mixed-line-ending, taplo-format,
      # taplo-lint. Single source of truth — when a hook fails CI fails;
      # a contributor who skips ``pre-commit install`` or commits with
      # ``--no-verify`` is still gated. Previously CI ran ruff / ruff
      # format / mypy as dedicated steps AND again via this hook
      # invocation, doubling the slowest gate (mypy) on every push.
      - name: pre-commit (all hooks)
        run: uv run pre-commit run --all-files --show-diff-on-failure

  security:
    name: dependency audit (py${{ matrix.python }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: export locked requirements
        run: uv export --frozen --python ${{ matrix.python }} --format requirements-txt --no-emit-project --output-file "$RUNNER_TEMP/requirements-audit.txt"
      - name: pip-audit (locked dependencies)
        run: uv run --python ${{ matrix.python }} pip-audit -r "$RUNNER_TEMP/requirements-audit.txt" --require-hashes --disable-pip

  pkg:
    name: package build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python 3.12
        run: uv python install 3.12
      - name: sync
        run: uv sync --frozen --python 3.12
      - name: build wheel + sdist
        run: uv build --no-build-isolation
      - name: twine check
        run: uv run twine check dist/*
      - name: upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 14
