name: release

# Two entry points:
#
# - ``push: tags: ['v*']`` — the routine release path. Tag a
#   commit ``vX.Y.Z`` and push: the pipeline runs verify →
#   smoke-install → pypi → github-release → homebrew-bump.
#
# - ``workflow_dispatch`` with ``target = testpypi | pypi`` — the
#   dry-run lane. ``testpypi`` publishes to test.pypi.org and
#   skips the GitHub Release + Homebrew bump (rehearses changes
#   to the release machinery itself without burning a real
#   version number). ``pypi`` must be run from the matching tag and
#   is only for retrying before PyPI accepts the version. After PyPI
#   publish succeeds, recover GitHub Release/Homebrew failures with
#   the manual steps in ``docs/RELEASING.md`` because PyPI versions
#   are immutable.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        required: true
        default: "testpypi"
        options:
          - testpypi
          - pypi

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  UV_VERSION: "0.11.19"

jobs:
  # ── Gate: tag matches __version__ + green tests + clean build ──────────
  verify:
    name: verify (tag ↔ version, tests, build)
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      target: ${{ steps.target.outputs.target }}
      tag_sha: ${{ steps.version.outputs.tag_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install supported Python versions
        run: uv python install 3.11 3.12 3.13
      - name: sync
        run: uv sync --frozen --python 3.12

      # Resolve the target channel: ``testpypi`` for the rehearsal
      # ``workflow_dispatch``, ``pypi`` for everything else (tag
      # push OR an explicit ``workflow_dispatch target=pypi``).
      - name: resolve target
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=pypi" >> "$GITHUB_OUTPUT"
          fi

      # The PyPI path requires the tag ref (``vX.Y.Z``) to match
      # ``aws_tui.__version__`` exactly and point at a commit already
      # reachable from origin/main. The TestPyPI rehearsal path can
      # run from a branch ref and intentionally skips the tag check.
      - name: tag-version match
        id: version
        run: |
          PKG_VERSION="$(uv run --python 3.12 python -c 'import aws_tui; print(aws_tui.__version__)')"
          TAG_REF="v${PKG_VERSION}"
          PUBLISH_VERSION="$PKG_VERSION"
          if [[ "${{ steps.target.outputs.target }}" == "testpypi" ]]; then
            PUBLISH_VERSION="${PKG_VERSION}.dev${GITHUB_RUN_NUMBER}"
            PKG_VERSION="$PKG_VERSION" PUBLISH_VERSION="$PUBLISH_VERSION" uv run --python 3.12 python -c 'import os; from pathlib import Path; path = Path("src/aws_tui/version.py"); text = path.read_text(); old = "__version__ = \"" + os.environ["PKG_VERSION"] + "\""; new = "__version__ = \"" + os.environ["PUBLISH_VERSION"] + "\""; path.write_text(text.replace(old, new))'
          fi
          echo "version=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$(git rev-list -n 1 "$TAG_REF" 2>/dev/null || git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${{ github.ref_name }}"
            TAG_VERSION="${REF#v}"
            if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
              echo "::error::tag '$REF' does not match aws_tui.__version__='$PKG_VERSION'" >&2
              exit 1
            fi
            echo "tag $REF matches __version__ $PKG_VERSION ✓"
          elif [[ "${{ steps.target.outputs.target }}" == "pypi" ]]; then
            if [[ "${{ github.ref_type }}" != "tag" || "${{ github.ref_name }}" != "$TAG_REF" ]]; then
              echo "::error::manual PyPI publish must run from existing tag '$TAG_REF' (current ref: ${{ github.ref_type }}/${{ github.ref_name }})" >&2
              exit 1
            fi
            echo "workflow_dispatch pypi target is pinned to tag $TAG_REF"
          else
            echo "workflow_dispatch — publishing TestPyPI rehearsal version $PUBLISH_VERSION (base __version__ $PKG_VERSION; no tag check)"
          fi
          TAG_SHA="$(git rev-list -n 1 "$TAG_REF" 2>/dev/null || true)"
          if [[ "${{ steps.target.outputs.target }}" == "pypi" ]]; then
            if [[ -z "$TAG_SHA" ]]; then
              echo "::error::missing release tag '$TAG_REF'" >&2
              exit 1
            fi
            if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
              echo "::error::release tag '$TAG_REF' points to $TAG_SHA, which is not reachable from origin/main" >&2
              exit 1
            fi
            echo "release tag $TAG_REF points to main history ($TAG_SHA)"
          fi

      - name: pytest supported Python matrix
        run: |
          for py in 3.11 3.12 3.13; do
            uv sync --frozen --python "$py"
            uv run --python "$py" pytest tests/unit tests/integration -v
          done
          uv sync --frozen --python 3.12

      - name: pytest coverage (unit + in-process integration)
        run: uv run --python 3.12 pytest tests/unit tests/integration --cov=aws_tui --cov-report=term-missing --cov-report=xml

      - name: pytest (MinIO integration tier)
        run: uv run --python 3.12 pytest -m integration -v

      - name: pytest (snapshot tier)
        run: uv run --python 3.12 pytest tests/snapshot -v

      - name: pytest (e2e tier)
        run: uv run --python 3.12 pytest tests/e2e -v

      - name: export locked requirements
        run: |
          for py in 3.11 3.12 3.13; do
            uv export --frozen --python "$py" --format requirements-txt --no-emit-project --output-file "$RUNNER_TEMP/requirements-audit-$py.txt"
          done

      - name: pip-audit (locked dependencies)
        run: |
          for py in 3.11 3.12 3.13; do
            uv run --python "$py" pip-audit -r "$RUNNER_TEMP/requirements-audit-$py.txt" --require-hashes --disable-pip
          done

      - name: pre-commit (all hooks)
        run: uv run --python 3.12 pre-commit run --all-files --show-diff-on-failure

      - name: layer rules
        run: ./scripts/check-layers.sh

      - name: build wheel + sdist
        run: uv build --no-build-isolation

      - name: twine check
        run: uv run twine check dist/*

      - name: upload built artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Gate: clean install from the built wheel on every supported OS ─────
  smoke-install:
    name: smoke install (${{ matrix.os }} / py${{ matrix.python }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: install built wheel and run console entry point
        shell: bash
        run: |
          uv venv --python ${{ matrix.python }} smoke-venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PY="smoke-venv/Scripts/python.exe"
            AWS_TUI="smoke-venv/Scripts/aws-tui.exe"
          else
            PY="smoke-venv/bin/python"
            AWS_TUI="smoke-venv/bin/aws-tui"
          fi
          uv pip install --python "$PY" dist/*.whl
          "$AWS_TUI" --version

  # ── PyPI / TestPyPI publish via Trusted Publisher (OIDC) ───────────────
  publish-pypi:
    name: publish (${{ needs.verify.outputs.target }})
    needs: [verify, smoke-install]
    runs-on: ubuntu-24.04
    # Environment gates the publish step on the maintainer's
    # approval click. ``pypi`` is configured with a required
    # reviewer in repo Settings; ``testpypi`` is unguarded
    # (rehearsal lane).
    environment:
      name: ${{ needs.verify.outputs.target }}
      url: ${{ needs.verify.outputs.target == 'pypi' && format('https://pypi.org/project/aws-tui/{0}/', needs.verify.outputs.version) || format('https://test.pypi.org/project/aws-tui/{0}/', needs.verify.outputs.version) }}
    permissions:
      # Required for PyPI Trusted Publisher OIDC handshake. NO
      # secret stored anywhere — GitHub mints a short-lived token
      # PyPI verifies against the pre-registered repo+workflow.
      id-token: write
      contents: read
    steps:
      - name: download built artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/

      - name: publish to TestPyPI
        if: needs.verify.outputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

      - name: publish to PyPI
        if: needs.verify.outputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true

  # ── GitHub Release with the per-version CHANGELOG section ──────────────
  publish-github:
    name: github release
    needs: [verify, publish-pypi]
    # Only on real PyPI publishes — testpypi is a rehearsal and
    # shouldn't leave artifacts on the Releases tab.
    if: needs.verify.outputs.target == 'pypi'
    runs-on: ubuntu-24.04
    permissions:
      # ``contents: write`` is required so the REST API call below can
      # create the release and attach the wheel + sdist.
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: download built artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/

      # Parse the changelog section between ``## [X.Y.Z]`` (or the
      # NUMBERED_DOCS form ``## 1.2. [X.Y.Z]``) and the next release
      # header. Awk is portable and runs in ubuntu's default image
      # without extra setup.
      - name: extract changelog section
        id: changelog
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          BODY="$(awk -v ver="$VERSION" '
            $0 ~ ("^## (([0-9]+\\.)+ )?\\[" ver "\\]") { capture=1; next }
            capture && /^## (([0-9]+\.)+ )?\[/ { exit }
            capture { print }
          ' CHANGELOG.md)"
          if [[ -z "$BODY" ]]; then
            echo "::error::no changelog section found for [$VERSION]" >&2
            exit 1
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo ""
            echo "---"
            echo ""
            echo "Install: \`pip install aws-tui==$VERSION\` · [PyPI](https://pypi.org/project/aws-tui/$VERSION/) · [Changelog](https://github.com/thekaveh/aws-tui/blob/main/CHANGELOG.md)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify.outputs.version }}
          BODY: ${{ steps.changelog.outputs.body }}
          TAG_SHA: ${{ needs.verify.outputs.tag_sha }}
        run: |
          # ``--target`` pins the release to the tag's commit (the
          # workflow_dispatch path may run from any ref; the tag-push
          # path is already on the tag commit so it's a no-op there).
          python3 - <<'PY'
          import json
          import mimetypes
          import os
          from pathlib import Path
          from urllib.error import HTTPError
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          version = os.environ["VERSION"]
          tag_sha = os.environ["TAG_SHA"]
          body = os.environ["BODY"]

          def _headers(content_type: str | None = None) -> dict[str, str]:
              headers = {
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              if content_type is not None:
                  headers["Content-Type"] = content_type
              return headers

          def _request_json(url: str, data: bytes | None = None) -> dict[str, object]:
              request = Request(url, data=data, headers=_headers("application/json"))
              try:
                  with urlopen(request, timeout=30) as response:
                      return json.loads(response.read().decode("utf-8"))
              except HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"GitHub API request failed: {exc.code} {detail}") from exc

          release_payload = json.dumps(
              {
                  "tag_name": f"v{version}",
                  "target_commitish": tag_sha,
                  "name": f"v{version}",
                  "body": body,
                  "draft": False,
                  "prerelease": False,
              }
          ).encode("utf-8")
          release = _request_json(
              f"https://api.github.com/repos/{repo}/releases",
              release_payload,
          )
          upload_url = str(release["upload_url"]).split("{", 1)[0]

          for artifact in sorted(Path("dist").iterdir()):
              if not artifact.is_file():
                  continue
              content_type = (
                  mimetypes.guess_type(artifact.name)[0] or "application/octet-stream"
              )
              url = f"{upload_url}?{urlencode({'name': artifact.name})}"
              request = Request(
                  url,
                  data=artifact.read_bytes(),
                  headers=_headers(content_type),
              )
              try:
                  with urlopen(request, timeout=60):
                      pass
              except HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(
                      f"GitHub release asset upload failed for {artifact.name}: "
                      f"{exc.code} {detail}"
                  ) from exc
          PY

  # ── Open a bump PR against the Homebrew tap ────────────────────────────
  bump-homebrew:
    name: homebrew bump
    needs: [verify, publish-pypi, publish-github]
    # Same gate as github-release — testpypi rehearsal should not
    # touch the Homebrew tap.
    if: needs.verify.outputs.target == 'pypi'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: thekaveh/homebrew-aws-tui
          # ``HOMEBREW_TAP_TOKEN`` is a fine-grained Personal
          # Access Token with ``Contents: read & write`` +
          # ``Pull requests: read & write`` on the tap repo only.
          # See docs/RELEASING.md for the one-time setup.
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: check formula exists
        id: formula
        working-directory: tap
        run: |
          if [[ -f "Formula/aws-tui.rb" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Formula/aws-tui.rb not found in tap repo; first release must bootstrap the formula manually after PyPI publish."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: download built artifacts
        if: steps.formula.outputs.exists == 'true'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/

      # The formula installs from PyPI's deterministic sdist URL, but
      # its sha256 comes from the already-built artifact so this job
      # does not depend on PyPI file CDN freshness.
      - name: hash built sdist
        if: steps.formula.outputs.exists == 'true'
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          PKG="aws_tui-${VERSION}.tar.gz"
          if [[ ! -f "dist/$PKG" ]]; then
            echo "::error::missing built sdist dist/$PKG" >&2
            exit 1
          fi
          SHA="$(sha256sum "dist/$PKG" | awk '{print $1}')"
          echo "PKG_URL=https://files.pythonhosted.org/packages/source/a/aws-tui/$PKG" >> "$GITHUB_ENV"
          echo "PKG_SHA=$SHA" >> "$GITHUB_ENV"

      - name: bump formula
        if: steps.formula.outputs.exists == 'true'
        working-directory: tap
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          FORMULA="Formula/aws-tui.rb"
          python3 - <<'PY'
          import os
          from pathlib import Path

          formula = Path("Formula/aws-tui.rb")
          lines = formula.read_text(encoding="utf-8").splitlines(keepends=True)
          in_resource = False
          replaced_url = False
          replaced_sha = False
          for idx, line in enumerate(lines):
              stripped = line.strip()
              if stripped.startswith("resource "):
                  in_resource = True
              if not in_resource and stripped.startswith('url "'):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines[idx] = f'{indent}url "{os.environ["PKG_URL"]}"\n'
                  replaced_url = True
                  continue
              if not in_resource and stripped.startswith('sha256 "'):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines[idx] = f'{indent}sha256 "{os.environ["PKG_SHA"]}"\n'
                  replaced_sha = True
                  continue
          if not (replaced_url and replaced_sha):
              raise SystemExit("top-level url/sha256 not found in Homebrew formula")
          formula.write_text("".join(lines), encoding="utf-8")
          PY

      - name: open bump PR
        if: steps.formula.outputs.exists == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: bump-aws-tui-${{ needs.verify.outputs.version }}
          title: "aws-tui ${{ needs.verify.outputs.version }}"
          commit-message: "aws-tui ${{ needs.verify.outputs.version }}"
          body: |
            Bump aws-tui to ${{ needs.verify.outputs.version }}.

            - PyPI: https://pypi.org/project/aws-tui/${{ needs.verify.outputs.version }}/
            - Release: https://github.com/thekaveh/aws-tui/releases/tag/v${{ needs.verify.outputs.version }}

            sha256 computed from the verified build artifact.
