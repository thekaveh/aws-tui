name: Bug report
description: Something broke or behaves unexpectedly
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Concise summary of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered list of keystrokes / actions.
      placeholder: |
        1. Launch with `aws-tui`
        2. Select connection `minio-local`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: aws-tui version
      description: Exact output of `aws-tui --version`, or the commit SHA for local development builds.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / terminal
      description: e.g. macOS 14.5 / iTerm2 3.5.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: From `<cache-dir>/log/aws-tui.log`; see docs/platforms.md for the exact OS path. Redact sensitive content.
      render: shell
