version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        applies-to: version-updates
        patterns:
          - "textual"
          - "boto3"
          - "aioboto3"
          - "botocore"
          - "anyio"
          - "aiofiles"
          - "keyring"
          - "tomli-w"
      python-dev:
        applies-to: version-updates
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "moto"
          - "twine"
          - "testcontainers*"
          - "types-*"
    labels: ["dependencies", "python"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]

  # Tracks bumps for the local-dev MinIO container declared in
  # scripts/test-services/s3/docker-compose.yml. Keeps the supply-
  # chain-reproducibility pin (no ``:latest``) maintained without
  # manual upgrades.
  - package-ecosystem: docker
    directory: "/scripts/test-services/s3/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]

  # Tracks the pinned hook versions in ``.pre-commit-config.yaml``
  # (pre-commit-hooks, astral-sh/ruff-pre-commit, ComPWA/taplo-pre-commit).
  # Without this entry the pinned ``rev:`` values drift behind upstream
  # silently — the previous loops fixed two such drifts by hand
  # (ruff v0.15.0 → v0.15.17 in the first loop, and the rationale note
  # the dev-deps cap comment now carries). Letting Dependabot raise
  # the PRs catches the drift on a weekly cadence.
  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels: ["dependencies", "tooling"]
