version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        applies-to: version-updates
        patterns:
          - "textual"
          - "boto3"
          - "aioboto3"
          - "botocore"
          - "anyio"
          - "aiofiles"
          - "keyring"
          - "tomli-w"
      python-dev:
        applies-to: version-updates
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "moto"
          - "twine"
          - "testcontainers*"
          - "types-*"
    labels: ["dependencies", "python"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]

  # Tracks bumps for the local-dev MinIO container declared in
  # scripts/test-services/s3/docker-compose.yml. Keeps the supply-
  # chain-reproducibility pin (no ``:latest``) maintained without
  # manual upgrades.
  - package-ecosystem: docker
    directory: "/scripts/test-services/s3/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]
