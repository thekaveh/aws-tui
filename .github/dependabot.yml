version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        applies-to: version-updates
        patterns:
          - "textual"
          - "boto3"
          - "aioboto3"
          - "botocore"
          - "anyio"
          - "aiofiles"
          - "keyring"
          - "tomli-w"
      python-dev:
        applies-to: version-updates
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "moto"
          - "factory-boy"
          - "freezegun"
          - "twine"
          - "testcontainers*"
          - "types-*"
    labels: ["dependencies", "python"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
